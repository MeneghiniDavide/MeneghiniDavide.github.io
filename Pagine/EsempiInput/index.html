<html>
    <head>
        <nav class="navbar">
            <ul>
                <li><a href="/index.html#Home" class="nav-link">Home</a></li>
                <li><a href="/index.html#ChiSono" class="nav-link">Chi sono</a></li>
                <li><a href="/index.html#Competenze" class="nav-link">Competenze</a></li>
                <li><a href="/index.html#Progetti" class="nav-link">Progetti</a></li>
                <li><a href="/index.html#Contatti" class="nav-link">Contatti</a></li>
                <li><a href="/index.html#FAQ" class="nav-link">FAQ</a></li>
            </ul>
        </nav>
    </head>
    
    <style>
        body{
            margin-top: 150px;
        }

        body { 
            font-family: 'IBM Plex Mono', monospace;
        }
        .navbar {
            background-color: rgb(171, 200, 162);
            position: fixed;
            top: 0;
            width: 100%;
            left: 0;
            z-index: 1000;
            text-align: center;

            transition: transform 0.2s ease-in-out;
        }

        .nav-hidden {
            transform: translateY(-100%);
        }

        .navbar ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .navbar li {
            display: inline-block;
        }

        .navbar li a {
            display: block;
            color: rgb(26, 36, 23);     
            text-align: center;
            padding: 0 20px;
            line-height: 60px;
            text-decoration: none;
            position: relative;
        }

        .navbar li a::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 20px;
            right: 20px;
            height: 3px;
            background-color: rgb(26, 36, 23);
            transform: scaleX(0); /* Larchezza iniziale della linea */
            transition: transform 0.3s ease;
            transform-origin: center; /* Posizione dell'animazione */
        }

        .navbar li a:hover {
            color: rgb(26, 36, 23);
        }

        .navbar li a:hover::after {
            transform: scaleX(1);
        }
    </style>

    <body>
        <!-- checkbox -->
        <input type="checkbox" id="calcio" class="hobby" value="calcio">
        <label>Calcio</label>
        <br>
        <input type="checkbox" id="basket" class="hobby" value="basket">
        <label>Basket</label>
        <br>
        <input type="checkbox" id="tennis" class="hobby" value="tennis">
        <label>Tennis</label>
        <br>

        <!-- radiobuttons -->
        <input type="radio" id="uomo" name="sesso" value="uomo">
        <label>Uomo</label>
        <br>
        <input type="radio" id="donna" name="sesso" value="donna">
        <label>Donna</label>

        <!-- comboBox -->
        <br>
        <select id="menu">
            <option value="1">Option 1</option>
            <option value="2">Option 2</option>
            <option value="3">Option 3</option>
        </select>
        <button onclick="stampaSelezionato()">Stampa Selezionato</button>
        <button onclick="riempiCombobox()">Riempi ComboBox</button>

        <!-- textBox -->
        <input type="text" id="textBox1">

        <script src="script.js"></script>
    </body>
    <script>
        //script per la barra di navigazione che scompare e compare in base allo scroll----------------------------------------------
        let lastScrollY = window.scrollY;
        const navbar = document.querySelector('.navbar');

        window.addEventListener('scroll', () => {
            if (window.scrollY > lastScrollY) {
            // Se scendo, aggiungo la classe per nascondere
            navbar.classList.add('nav-hidden');
            } else {
            // Se salgo, rimuovo la classe per mostrare
            navbar.classList.remove('nav-hidden');
            }
            lastScrollY = window.scrollY;
        });
    </script>
</html>
