<!DOCTYPE html>
<html lang="it">
<head>
    <title>Tavola Pitagorica</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
        .navbar {
            background-color: rgb(171, 200, 162);
            position: fixed;
            top: 0;
            width: 100%;
            left: 0;
            z-index: 1000;
            text-align: center;

            transition: transform 0.2s ease-in-out;
        }

        .nav-hidden {
            transform: translateY(-100%);
        }

        .navbar ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .navbar li {
            display: inline-block;
        }

        .navbar li a {
            display: block;
            color: rgb(26, 36, 23);     
            text-align: center;
            padding: 0 20px;
            line-height: 60px;
            text-decoration: none;
            position: relative;
        }

        .navbar li a::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 20px;
            right: 20px;
            height: 3px;
            background-color: rgb(26, 36, 23);
            transform: scaleX(0); /* Larchezza iniziale della linea */
            transition: transform 0.3s ease;
            transform-origin: center; /* Posizione dell'animazione */
        }

        .navbar li a:hover {
            color: rgb(26, 36, 23);
        }

        .navbar li a:hover::after {
            transform: scaleX(1);
        }
        body { 
            font-family: 'IBM Plex Mono', monospace;
        }
    </style>
<body>
    <nav class="navbar">
            <ul>
                <li><a href="/index.html#Home" class="nav-link">Home</a></li>
                <li><a href="/index.html#ChiSono" class="nav-link">Chi sono</a></li>
                <li><a href="/index.html#Competenze" class="nav-link">Competenze</a></li>
                <li><a href="/index.html#Progetti" class="nav-link">Progetti</a></li>
                <li><a href="/index.html#Contatti" class="nav-link">Contatti</a></li>
                <li><a href="/index.html#FAQ" class="nav-link">FAQ</a></li>
            </ul>
        </nav>

    <h1 id="titolo">Tavola Pitagorica 10x10</h1>
    <div id="tavola-container"></div>

    <script src="tavola-pitagorica.js"></script>

</body>
</html>
